    <style>
        :root {
            --bg-color: #FCFBF8;
            --surface-color: #FFFFFF;
            --primary-navy: #1A2E4A;
            --header-bg: rgba(252, 251, 248, 0.95);
            --accent-gold: #CFB286;
            --accent-gold-rgb: 207, 178, 134;
            --accent-brown: #915B27;
            --accent-brown-rgb: 145, 91, 39;
            --text-dark: #1e1e1e;
            --text-muted: #7f8c8d;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.06);
            
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Work Sans', sans-serif;
            --theme-transition: background-color 0.5s ease, color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body { 
            font-family: var(--font-body); 
            background-color: var(--bg-color); 
            color: var(--text-dark); 
            line-height: 1.7; 
            transition: var(--theme-transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        h1, h2, h3, h4 { 
            font-family: var(--font-display); 
            color: var(--primary-navy); 
            transition: var(--theme-transition); 
        }
        
        a { 
            text-decoration: none; 
            color: var(--primary-navy); 
            transition: var(--theme-transition); 
        }
        
        a:hover { color: var(--accent-brown); }

        /* ========== HEADER ========== */
        header { 
            padding: 16px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(var(--accent-gold-rgb), 0.3); 
            transition: var(--theme-transition);
        }
        
        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            text-decoration: none !important;
        }
        
        .logo-img { 
            width: 48px; 
            height: 48px; 
            border-radius: 12px; 
            object-fit: cover;
            box-shadow: 0 4px 12px rgba(var(--accent-gold-rgb), 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .logo-container:hover .logo-img {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(var(--accent-gold-rgb), 0.4);
        }
        
        .logo-text { 
            font-family: var(--font-display); 
            font-size: 26px; 
            font-weight: 700; 
            letter-spacing: 3px; 
            color: var(--primary-navy);
            transition: var(--theme-transition);
        }
        
        .nav-links { 
            display: flex; 
            gap: 28px; 
            align-items: center; 
        }
        
        .nav-links a { 
            font-size: 15px; 
            font-weight: 500;
            position: relative;
            padding: 4px 0;
            transition: color 0.3s ease;
            color: var(--primary-navy);
            text-decoration: none;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--accent-brown);
            transition: width 0.3s ease;
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }

        /* ========== MAIN CONTENT ========== */
        main { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 60px 20px; 
        }

        /* ========== AUTH CARD ========== */
        .auth-card { 
            background: var(--surface-color); 
            border-radius: 24px; 
            padding: 48px 40px; 
            max-width: 480px; 
            width: 100%; 
            box-shadow: var(--card-shadow);
            text-align: center; 
            border: 1px solid rgba(var(--accent-gold-rgb), 0.3);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-brown), var(--accent-gold));
            opacity: 0.8;
        }
        
        .auth-card .icon { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(var(--accent-gold-rgb), 0.1);
            margin-bottom: 24px;
        }
        
        .auth-card .icon i {
            font-size: 36px; 
            color: var(--accent-brown);
        }
        
        .auth-card .icon.success-icon {
            background: rgba(5, 150, 105, 0.1);
        }
        
        .auth-card .icon.success-icon i {
            color: #059669;
        }
        
        .auth-card .icon.error-icon {
            background: rgba(220, 38, 38, 0.1);
        }
        
        .auth-card .icon.error-icon i {
            color: #DC2626;
        }
        
        .auth-card h1 { 
            font-size: 30px; 
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary-navy), var(--accent-brown));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .auth-card .email-display {
            color: var(--accent-brown);
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        
        .auth-card p { 
            color: var(--text-muted); 
            margin-bottom: 24px; 
            font-size: 15px;
            line-height: 1.7;
        }

        /* ========== FORM ELEMENTS ========== */
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        
        .form-group label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--primary-navy); 
            font-size: 14px;
            font-family: var(--font-body);
        }
        
        .password-wrapper { 
            position: relative; 
        }
        
        .password-wrapper input { 
            width: 100%; 
            padding: 14px 48px 14px 16px; 
            border: 2px solid rgba(var(--accent-gold-rgb), 0.3);
            border-radius: 12px; 
            font-family: var(--font-body); 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease; 
            background: var(--bg-color); 
            color: var(--text-dark); 
        }
        
        .password-wrapper input:focus { 
            border-color: var(--accent-brown);
            box-shadow: 0 0 0 3px rgba(var(--accent-brown-rgb), 0.1);
        }
        
        .toggle-password { 
            position: absolute; 
            right: 14px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: none; 
            border: none; 
            cursor: pointer; 
            color: var(--text-muted); 
            font-size: 18px;
            padding: 4px;
            transition: color 0.3s ease;
        }
        
        .toggle-password:hover { 
            color: var(--accent-brown); 
        }

        /* ========== BUTTON ========== */
        .button { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%; 
            padding: 16px 24px; 
            background: linear-gradient(135deg, var(--primary-navy), #2a4060); 
            color: #FFFFFF; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 600; 
            font-family: var(--font-body); 
            cursor: pointer; 
            transition: all 0.4s ease;
            box-shadow: 0 8px 24px rgba(26, 46, 74, 0.2);
            text-decoration: none !important;
        }
        
        .button:hover { 
            background: linear-gradient(135deg, #2a4060, var(--primary-navy));
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(26, 46, 74, 0.3); 
            color: #FFFFFF; 
        }
        
        .button:disabled { 
            opacity: 0.6; 
            cursor: not-allowed;
            transform: none;
        }
        
        .button-secondary {
            background: transparent;
            border: 2px solid rgba(var(--accent-gold-rgb), 0.5);
            color: var(--primary-navy);
            box-shadow: none;
        }
        
        .button-secondary:hover {
            background: rgba(var(--accent-gold-rgb), 0.1);
            border-color: var(--accent-brown);
            color: var(--accent-brown);
            box-shadow: none;
        }

        /* ========== STORE BUTTONS ROW ========== */
        .store-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }
        
        .store-row .button {
            flex: 1;
            max-width: 200px;
            font-size: 14px;
            padding: 14px 20px;
        }

        /* ========== STATES ========== */
        .hidden { display: none !important; }
        
        /* ========== SPINNER ========== */
        .spinner-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .spinner { 
            width: 48px; 
            height: 48px; 
            border: 4px solid rgba(var(--accent-gold-rgb), 0.2);
            border-top: 4px solid var(--accent-brown); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        /* ========== ALERTS ========== */
        .alert { 
            padding: 14px 18px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            font-size: 14px; 
            text-align: left;
            font-weight: 500;
        }
        
        .alert-error { 
            background: #FEF2F2; 
            color: #991B1B; 
            border: 1px solid #FECACA; 
        }
        
        .alert-success { 
            background: #ECFDF5; 
            color: #065F46; 
            border: 1px solid #A7F3D0; 
        }

        /* ========== FOOTER ========== */
        footer { 
            background: linear-gradient(180deg, var(--primary-navy), #0f1f33); 
            padding: 70px 5% 35px;
            border-top: 1px solid rgba(var(--accent-gold-rgb), 0.3); 
            transition: var(--theme-transition);
            color: #FFFFFF;
            margin-top: auto;
        }
        
        .footer-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 24px; 
        }
        
        .footer-brand h2 { 
            font-size: 24px; 
            letter-spacing: 3px; 
            margin-bottom: 0;
            color: var(--accent-gold);
        }
        
        .footer-links { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap;
        }
        
        .footer-links a { 
            font-size: 13px; 
            color: rgba(255,255,255,0.7);
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--accent-gold);
        }
        
        #footer-container footer {
            animation: footerFadeIn 0.3s ease;
        }
        
        @keyframes footerFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-contact { color: rgba(255,255,255,0.7); font-size: 14px; }
        .footer-contact a { color: var(--accent-gold); font-weight: 500; }
        .footer-contact .separator { color: rgba(255,255,255,0.3); margin: 0 8px; }
        
        .copyright { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 12px; 
            color: rgba(255,255,255,0.5); 
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .auth-card { 
                padding: 36px 24px; 
                border-radius: 20px;
            }
            .auth-card h1 { font-size: 26px; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 16px; }
            header { flex-direction: column; gap: 12px; }
            .footer-content { flex-direction: column; text-align: center; }
            .footer-links { justify-content: center; }
            .store-row { flex-direction: column; align-items: center; }
            .store-row .button { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="https://orhar.com/" class="logo-container" target="_top" rel="noopener">
            <img src="logo.png" alt="ORHAR Logo" class="logo-img" onerror="this.style.display='none'">
            <span class="logo-text">ORHAR</span>
        </a>
        <nav class="nav-links">
            <a href="https://orhar.com/" id="navHome" target="_top" rel="noopener">Home</a>
            <a href="https://orhar.com/contact" id="navContact" target="_top" rel="noopener">Contact</a>
        </nav>
    </header>

    <main>
        <div class="auth-card">
            <!-- ========== LOADING STATE ========== -->
            <div id="loading-state">
                <div class="spinner-wrapper">
                    <div class="spinner"></div>
                    <p id="loading-text">Processing...</p>
                </div>
            </div>

            <!-- ========== PASSWORD RESET FORM ========== -->
            <div id="reset-password-view" class="hidden">
                <div class="icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1 id="reset-title">Reset Your Password</h1>
                <p class="email-display" id="reset-email"></p>

                <div id="reset-error" class="alert alert-error hidden"></div>
                <div id="reset-success" class="alert alert-success hidden"></div>

                <form id="reset-form">
                    <div class="form-group">
                        <label for="new-password" id="label-new">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="new-password" placeholder="Min 8 characters" minlength="8" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('new-password', this)" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password" id="label-confirm">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm-password" placeholder="Confirm password" minlength="8" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', this)" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="button" id="reset-submit">
                        <i class="fas fa-lock"></i> Reset Password
                    </button>
                </form>
            </div>

            <!-- ========== EMAIL VERIFICATION SUCCESS ========== -->
            <div id="verify-email-view" class="hidden">
                <div class="icon success-icon">
                    <i class="fas fa-circle-check"></i>
                </div>
                <h1 id="verify-title">Email Verified!</h1>
                <p id="verify-message">Your email has been successfully verified. You can now access all features of ORHAR.</p>
                <button onclick="openAppWithDeepLink('Home')" class="button" id="verify-open-app">
                    <i class="fas fa-external-link-alt"></i> Open ORHAR
                </button>
            </div>

            <!-- ========== ERROR STATE ========== -->
            <div id="error-view" class="hidden">
                <div class="icon error-icon">
                    <i class="fas fa-circle-exclamation"></i>
                </div>
                <h1 id="error-title">Action Failed</h1>
                <p id="error-message">Something went wrong.</p>
                <div class="alert alert-error" id="error-detail"></div>
                <a href="https://orhar.com/contact" class="button button-secondary" style="margin-top: 12px;" target="_top" rel="noopener">
                    <i class="fas fa-envelope"></i> Contact Support
                </a>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>
        const savedLang = localStorage.getItem('orhar_lang');
        const footerBrowserLang = navigator.language.slice(0, 2);
        const supported = ['en', 'fr', 'es', 'de', 'it', 'pt', 'pl'];
        let footerLang = 'en';
        if (savedLang && supported.includes(savedLang)) footerLang = savedLang;
        else if (supported.includes(footerBrowserLang)) footerLang = footerBrowserLang;
        
        fetch('footer.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const footerBlock = doc.getElementById('footer-' + footerLang) || doc.getElementById('footer-en');
                if (footerBlock) {
                    footerBlock.style.display = '';
                    document.getElementById('footer-container').appendChild(footerBlock);
                }
            })
            .catch(() => console.log('Footer not available'));
    </script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" crossorigin="anonymous"></script>

    <script>
        // ===== SAFETY NET: catch real script-level failures & hangs =====
        window.addEventListener('error', function (e) {
            console.error('Uncaught error:', e.message, e.filename, e.lineno, e.colno);
            // Ignore generic cross-origin "Script error." events.
            // They are often from external scripts/styles and are not always fatal.
            if (e.message === 'Script error.' && !e.filename) {
                return;
            }
        
            const loadingEl = document.getElementById('loading-state');
            const errView = document.getElementById('error-view');
        
            if (loadingEl && !loadingEl.classList.contains('hidden')) {
                loadingEl.classList.add('hidden');
                if (errView && errView.classList.contains('hidden')) {
                    errView.classList.remove('hidden');
                    document.getElementById('error-detail').textContent =
                        'Technical error: ' + (e.message || 'Unknown script error');
                }
            }
        });
        
        // Timeout fallback: if still loading after 10s, something hung
        setTimeout(() => {
            const loadingEl = document.getElementById('loading-state');
            const errView = document.getElementById('error-view');
        
            if (loadingEl && !loadingEl.classList.contains('hidden')) {
                loadingEl.classList.add('hidden');
                if (errView) {
                    errView.classList.remove('hidden');
                    document.getElementById('error-detail').textContent =
                        'Request timed out. Firebase may be blocked or unavailable for this domain.';
                }
            }
        }, 10000);
    </script>

        // ========== LANGUAGE DETECTION ==========
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');
        const userLangParam = urlParams.get('lang');
        const browserLang = navigator.language.split('-')[0];
        
        let activeLang = 'en';
        if (userLangParam && translations[userLangParam]) activeLang = userLangParam;
        else if (translations[browserLang]) activeLang = browserLang;

        const lang = translations[activeLang];

        // ========== APPLY TRANSLATIONS ==========
        function setText(id, value) {
            const el = document.getElementById(id);
            if (el && value) el.textContent = value;
        }
        
        setText('page-title', lang.pageTitle);
        setText('loading-text', lang.loading);
        setText('navHome', lang.navHome);
        setText('navContact', lang.navContact);

        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBEEWsFIsv2NyS5LZEJn0jMjXCT-XdAbgU",
            authDomain: "parobible-app.firebaseapp.com",
            projectId: "parobible-app",
            storageBucket: "parobible-app.firebasestorage.app",
            messagingSenderId: "324929509217",
            appId: "1:324929509217:web:947e574e2ea14365505720"
        };
        
        let auth = null;
        try {
            if (!window.firebase) {
                throw new Error('Firebase SDK failed to load.');
            }
        
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
        } catch (e) {
            console.error('Firebase init failed:', e);
            showError('Firebase initialization failed: ' + e.message);
        }

        // ========== MAIN ACTION HANDLER ==========
        async function handleAction() {
            if (!auth) {
                showError('Firebase Auth is not available. Please try again later.');
                return;
            }
            
            if (!oobCode) {
                showError(lang.errorInvalid);
                return;
            }

            try {
                switch(mode) {
                    case 'resetPassword':
                        await handlePasswordReset();
                        break;
                    case 'verifyEmail':
                        await handleEmailVerification();
                        break;
                    case 'recoverEmail':
                        await handleEmailRecovery();
                        break;
                    default:
                        showError(lang.errorInvalid);
                }
            } catch (error) {
                console.error('Action error:', error);
                showError(error.message || lang.errorDefault);
            }
        }

        // ========== PASSWORD RESET ==========
        async function handlePasswordReset() {
            try {
                const email = await auth.verifyPasswordResetCode(oobCode);
                console.log('✅ Password reset code verified for:', email);
                
                document.getElementById('reset-email').textContent = `${lang.resetFor} ${email}`;
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('reset-password-view').classList.remove('hidden');
                
                document.getElementById('reset-title').textContent = lang.resetTitle;
                document.getElementById('label-new').textContent = lang.labelNew;
                document.getElementById('label-confirm').textContent = lang.labelConfirm;
                document.getElementById('new-password').placeholder = lang.placeholderNew;
                document.getElementById('confirm-password').placeholder = lang.placeholderConfirm;
                document.getElementById('reset-submit').innerHTML = `<i class="fas fa-lock"></i> ${lang.resetSubmit}`;
            } catch (error) {
                console.error('Password reset verification error:', error);
                const message = error.code === 'auth/expired-action-code' ? lang.errorExpired : lang.errorInvalid;
                showError(message);
            }
        }

        // ========== EMAIL VERIFICATION ==========
        async function handleEmailVerification() {
            try {
                await auth.applyActionCode(oobCode);
                console.log('✅ Email verified successfully');
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('verify-email-view').classList.remove('hidden');
                
                document.getElementById('verify-title').textContent = lang.verifyTitle;
                document.getElementById('verify-message').textContent = lang.verifyMessage;
                document.getElementById('verify-open-app').innerHTML = `<i class="fas fa-external-link-alt"></i> ${lang.openApp}`;
                
                setTimeout(() => {
                    openAppWithDeepLink('Home');
                }, 2000);
            } catch (error) {
                console.error('Email verification error:', error);
                const message = error.code === 'auth/expired-action-code' ? lang.errorExpired : lang.errorInvalid;
                showError(message);
            }
        }

        // ========== EMAIL RECOVERY ==========
        async function handleEmailRecovery() {
            try {
                const info = await auth.checkActionCode(oobCode);
                await auth.applyActionCode(oobCode);
                console.log('✅ Email recovery completed');
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('verify-email-view').classList.remove('hidden');
                
                document.getElementById('verify-title').textContent = "Email Recovered";
                document.getElementById('verify-message').textContent = "Your email has been successfully recovered.";
            } catch (error) {
                console.error('Email recovery error:', error);
                showError(lang.errorDefault);
            }
        }

        // ========== PASSWORD RESET FORM SUBMISSION ==========
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('reset-error');
            const successDiv = document.getElementById('reset-success');
            const submitBtn = document.getElementById('reset-submit');
            
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = lang.errorMatch;
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (newPassword.length < 8) {
                errorDiv.textContent = lang.errorLength;
                errorDiv.classList.remove('hidden');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0;"></div> ${lang.resetSubmitting}`;
            
            try {
                await auth.confirmPasswordReset(oobCode, newPassword);
                console.log('✅ Password reset successful');
                
                successDiv.textContent = lang.resetSuccess;
                successDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    openAppWithDeepLink('ProfileManagement');
                }, 2000);
            } catch (error) {
                console.error('Password reset error:', error);
                errorDiv.textContent = error.message || lang.errorDefault;
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fas fa-lock"></i> ${lang.resetSubmit}`;
            }
        });

        // ========== TOGGLE PASSWORD VISIBILITY ==========
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // ========== SHOW ERROR STATE ==========
        function showError(message) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('reset-password-view').classList.add('hidden');
            document.getElementById('verify-email-view').classList.add('hidden');
            document.getElementById('error-view').classList.remove('hidden');
            
            document.getElementById('error-title').textContent = lang.errorTitle;
            document.getElementById('error-message').textContent = lang.errorMessage;
            document.getElementById('error-detail').textContent = message;
        }

        // ========== DEEP LINK HANDLER ==========
        function openAppWithDeepLink(screen) {
            // Update to your app's URL scheme
            const deepLinkUrl = `orhar://navigate/${screen}`;
            const fallbackDelay = 2000;
            const startTime = Date.now();
            
            console.log('🔗 Attempting to open app:', deepLinkUrl);
            window.location.href = deepLinkUrl;
            
            const fallbackTimer = setTimeout(() => {
                if (Date.now() - startTime < fallbackDelay + 500) {
                    console.log('📱 App not installed, showing fallback');
                    showAppNotInstalledMessage();
                }
            }, fallbackDelay);
            
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    clearTimeout(fallbackTimer);
                    console.log('✅ App opened successfully');
                }
            });
        }

        // ========== APP NOT INSTALLED FALLBACK ==========
        function showAppNotInstalledMessage() {
            const card = document.querySelector('.auth-card');
            card.innerHTML = `
                <div class="icon">
                    <i class="fas fa-mobile-screen"></i>
                </div>
                <h1>${lang.appNotInstalled}</h1>
                <p>${lang.installMessage}</p>
                <div class="store-row">
                    <a href="https://orhar.com" class="button" target="_top" rel="noopener">
                        <i class="fab fa-apple"></i> App Store
                    </a>
                    <a href="https://play.google.com/store/apps/details?id=com.orhar.bible" class="button">
                        <i class="fab fa-google-play"></i> Play Store
                    </a>
                </div>
                <a href="https://orhar.com/contact" class="button button-secondary" style="margin-top: 16px;" target="_top" rel="noopener">
                    <i class="fas fa-envelope"></i> ${lang.contactSupport}
                </a>
            `;
        }

        // ========== INITIALIZE ==========
        handleAction();
    </script>
